{% extends "base.html" %}
{% block title %}{{ 'Edit' if note else 'New' }} note – Knowledge Base{% endblock %}

{% block content %}
  <form class="editor" method="post"
        action="{{ '/notes/' ~ note.slug ~ '/edit' if note else '/notes/new' }}">
    <div class="editor-bar">
      <input type="text" name="title" placeholder="Title" required
             value="{{ note.title if note else '' }}">
      <button type="submit" class="btn btn-primary">Save</button>
      <a class="btn" href="/notes">Cancel</a>
    </div>

    <div class="editor-fields">
      <input type="date" name="date" value="{{ note.date if note else '' }}">
      <input type="text" name="tags" placeholder="tags, comma, separated"
             value="{{ note.tags|join(', ') if note else '' }}">
      <select name="theme" title="Note theme">
        {% for th in themes %}
        <option value="{{ th }}" {{ 'selected' if note and note.theme == th else ('selected' if not note and th == 'plain' else '') }}>{{ th|capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="editor-panes">
      <textarea name="content" id="md-input"
                placeholder="Write your note in markdown…  (paste an image to upload it)">{{ note.content if note else '' }}</textarea>
      <div class="preview markdown" id="md-preview"></div>
    </div>
  </form>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>initEditor();</script>
{% endblock %}
