{% extends "base.html" %}
{% block title %}New TOEIC set – Knowledge Base{% endblock %}

{% block content %}
  <form class="editor" method="post" action="/toeic/new">
    <div class="editor-bar">
      <input type="text" name="title" placeholder="Title (e.g. Part 5 — Grammar Set 2)" required
             value="{{ set.title if set else '' }}">
      <button type="submit" class="btn btn-primary">Save</button>
      <a class="btn" href="/toeic">Cancel</a>
    </div>

    <div class="editor-fields">
      <select name="part" title="TOEIC part">
        {% for p in [5, 6, 7] %}
        <option value="{{ p }}" {{ 'selected' if set and set.part == p else '' }}>Part {{ p }}</option>
        {% endfor %}
      </select>
      <input type="text" name="tags" placeholder="tags, comma, separated"
             value="{{ set.tags|join(', ') if set else '' }}">
    </div>
    <input type="text" name="summary" placeholder="Short summary (optional)"
           class="full" value="{{ set.summary if set else '' }}">

    <p class="muted editor-hint">
      Use <code>::: question … :::</code> blocks (and <code>::: passage … :::</code>
      for Part 6/7). Choices are <code>- A. text</code> lines; add
      <code>answer:</code> and <code>note:</code>. See <code>toeic/README.md</code>.
    </p>

    <textarea name="content" id="md-input" class="toeic-content"
              placeholder="Write TOEIC blocks here…">{{ set.content if set else default_body }}</textarea>
  </form>
{% endblock %}
