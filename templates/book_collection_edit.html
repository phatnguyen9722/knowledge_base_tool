{% extends "base.html" %}
{% block title %}Edit {{ collection.title }} – Books{% endblock %}

{% block content %}
  <form class="editor" method="post" action="/books/{{ collection.slug }}/edit">
    <div class="editor-bar">
      <input type="text" name="title" placeholder="Collection title" required
             value="{{ collection.title }}">
      <button type="submit" class="btn btn-primary">Save</button>
      <a class="btn" href="/books/{{ collection.slug }}">Cancel</a>
    </div>

    <div class="editor-fields">
      <input type="text" name="author" placeholder="Author (optional)"
             value="{{ collection.author }}">
      <input type="text" name="tags" placeholder="tags, comma, separated"
             value="{{ collection.tags|join(', ') }}">
    </div>
    <input type="text" name="description" class="full"
           placeholder="Short description (optional)" value="{{ collection.description }}">

    <div class="cover-field">
      <label class="cover-label">Cover image
        <input type="file" accept="image/*" data-cover-file>
      </label>
      <input type="text" name="cover" id="cover-url" class="full"
             placeholder="…or paste an image URL (e.g. /img/abc.png)"
             value="{{ collection.cover }}">
      <img id="cover-preview" class="cover-preview" alt="cover preview"
           {{ '' if collection.cover else 'hidden' }}
           {% if collection.cover %}src="{{ collection.cover }}"{% endif %}>
    </div>
  </form>
{% endblock %}

{% block scripts %}
<script>initCoverUpload();</script>
{% endblock %}
